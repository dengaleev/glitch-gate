[sources.caddy]
type = "file"
include = ["/var/log/caddy/access.log*"]

[transforms.parse_caddy]
type = "remap"
inputs = ["caddy"]
source = '''
structured = parse_json!(.message)
. = structured
'''

# [sinks.debug]
# type = "console"
# inputs = ["parse_caddy"]
# encoding.codec = "json"

[sinks.kafka]
type = "kafka"
inputs = ["parse_caddy"]
bootstrap_servers = "kafka:9092"
topic = "caddy-access"
encoding.codec = "json"
