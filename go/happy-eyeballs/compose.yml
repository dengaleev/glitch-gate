# Dual-stack network where "mock.test" has both an IPv6 and IPv4 address. The
# server drops inbound IPv6 SYNs to :8080, so the client's IPv6 connect stalls
# and Go's Happy Eyeballs falls back to IPv4.
#
#   docker compose up --build

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    cap_add:
      - NET_ADMIN # nftables needs to manage the kernel firewall
    networks:
      demo:
        ipv4_address: 172.28.0.10
        ipv6_address: 2001:db8:1::10
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8080/"]
      interval: 1s
      timeout: 2s
      retries: 15

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    depends_on:
      server:
        condition: service_healthy
    # Give "mock.test" both families so Go resolves a dual-stack name.
    extra_hosts:
      - "mock.test:172.28.0.10"
      - "mock.test:2001:db8:1::10"
    networks:
      - demo
    command: ["-url", "http://mock.test:8080"]

networks:
  demo:
    enable_ipv6: true
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
        # 2001:db8::/32 (documentation range) sorts as global unicast under RFC
        # 6724, so Go prefers it over private IPv4 and tries IPv6 first; a ULA
        # (fd00::/8) would sort below IPv4 and never exercise the fallback.
        - subnet: 2001:db8:1::/64
